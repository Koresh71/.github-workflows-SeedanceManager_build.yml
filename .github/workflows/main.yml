name: Build SeedanceManager PRO
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Install DMG Tool
        run: brew install create-dmg

      - name: Build Mac App
        run: |
          # Умный сборщик ресурсов (ищет файлы в репозитории)
          EXTRA_ARGS=""
          for f in *.png *.jpg *.jpeg *.gif *.json *.ikd *.mp3; do
            if [ -e "$f" ]; then
              EXTRA_ARGS="$EXTRA_ARGS --add-data $f:."
              echo "Автоматически добавлен файл: $f"
            fi
          done

          pyinstaller --noconfirm --onefile --windowed \
          --icon "logo.icns" --add-data "logo.icns:." \
          $EXTRA_ARGS \
          --name "SeedanceManager" "SeedanceManager_mac.py"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -r "dist/SeedanceManager.app" dist/dmg/
          create-dmg \
            --volname "SeedanceManager Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SeedanceManager.app" 175 190 \
            --hide-extension "SeedanceManager.app" \
            --app-drop-link 425 190 \
            "dist/SeedanceManager_Premium.dmg" \
            "dist/dmg/"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: SeedanceManager-Mac-Package
          path: dist/SeedanceManager_Premium.dmg
